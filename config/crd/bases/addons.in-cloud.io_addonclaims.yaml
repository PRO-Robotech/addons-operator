                x-kubernetes-list-type: map
              deployed:
                description: Deployed indicates the remote Addon has been deployed
                  at least once.
                type: boolean
              externalManagedControlPlane:
                description: |-
                  ExternalManagedControlPlane indicates the control plane is externally managed.
                  Populated only when annotation "external-status/type" is present.
                type: boolean
              initialization:
                description: Initialization contains CAPI v1beta2 initialization status.
                properties:
                  controlPlaneInitialized:
                    description: ControlPlaneInitialized indicates the first control
