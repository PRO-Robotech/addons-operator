# This rule is not used by the project addon-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the addons.in-cloud.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: addon-operator
    app.kubernetes.io/managed-by: kustomize
  name: addon-editor-role
rules:
- apiGroups:
  - addons.in-cloud.io
  resources:
  - addons
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - addons.in-cloud.io
  resources:
  - addons/status
  verbs:
  - get
