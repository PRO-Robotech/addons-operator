{{- if .Values.rbacHelpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: addon-operator
    name: addon-operator-addonphase-admin-role
rules:
    - apiGroups:
        - addons.in-cloud.io
      resources:
        - addonphases
      verbs:
        - '*'
    - apiGroups:
        - addons.in-cloud.io
      resources:
        - addonphases/status
      verbs:
        - get
{{- end }}
