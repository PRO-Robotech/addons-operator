{{- if .Values.rbacHelpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: addon-operator
    name: addon-operator-addon-editor-role
rules:
    - apiGroups:
        - addons.in-cloud.io
      resources:
        - addons
      verbs:
        - create
        - delete
        - get
        - list
        - patch
        - update
        - watch
    - apiGroups:
        - addons.in-cloud.io
      resources:
        - addons/status
      verbs:
        - get
{{- end }}
