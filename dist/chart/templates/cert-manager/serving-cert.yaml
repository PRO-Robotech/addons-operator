{{- if .Values.certManager.enable }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: addon-operator
  name: addon-operator-serving-cert
  namespace: {{ .Release.Namespace }}
spec:
  dnsNames:
    - addon-operator-webhook-service.{{ .Release.Namespace }}.svc
    - addon-operator-webhook-service.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
  {{- if .Values.certManager.useExternalIssuer }}
    {{ .Values.certManager.externalIssuer | toYaml | nindent 4 }}
  {{- else }}
    kind: Issuer
    name: {{ include "chart.name" . }}-selfsigned-issuer
  {{- end }}
  secretName: webhook-server-cert
{{- end }}
