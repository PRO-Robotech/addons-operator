apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
    annotations:
        {{- if .Values.certManager.enable }}
        cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/addon-operator-serving-cert
        {{- end }}
    name: addon-operator-validating-webhook-configuration
webhooks:
    - admissionReviewVersions:
        - v1
      clientConfig:
        service:
            name: addon-operator-webhook-service
            namespace: {{ .Release.Namespace }}
            path: /validate-addons-in-cloud-io-v1alpha1-addon
      failurePolicy: Fail
      name: vaddon-v1alpha1.kb.io
      rules:
        - apiGroups:
            - addons.in-cloud.io
          apiVersions:
            - v1alpha1
          operations:
            - CREATE
            - UPDATE
          resources:
            - addons
      sideEffects: None
    - admissionReviewVersions:
        - v1
      clientConfig:
        service:
            name: addon-operator-webhook-service
            namespace: {{ .Release.Namespace }}
            path: /validate-addons-in-cloud-io-v1alpha1-addonphase
      failurePolicy: Fail
      name: vaddonphase-v1alpha1.kb.io
      rules:
        - apiGroups:
            - addons.in-cloud.io
          apiVersions:
            - v1alpha1
          operations:
            - CREATE
            - UPDATE
          resources:
            - addonphases
      sideEffects: None
    - admissionReviewVersions:
        - v1
      clientConfig:
        service:
            name: addon-operator-webhook-service
            namespace: {{ .Release.Namespace }}
            path: /validate-addons-in-cloud-io-v1alpha1-addonvalue
      failurePolicy: Fail
      name: vaddonvalue-v1alpha1.kb.io
      rules:
        - apiGroups:
            - addons.in-cloud.io
          apiVersions:
            - v1alpha1
          operations:
            - CREATE
            - UPDATE
          resources:
            - addonvalues
      sideEffects: None
