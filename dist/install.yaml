                                type: object
                                x-kubernetes-map-type: atomic
                              name:
                                description: Name of the resource.
                                type: string
                              namespace:
                                description: |-
                                  Namespace of the resource.
                                  If empty, uses cluster-scoped lookup or same namespace as evaluating resource.
                                type: string
                            required:
                            - apiVersion
                            - kind
                            - name
                            type: object
                          value:
                            description: |-
                              Value to compare against. Required for comparison operators.
                              Use JSON encoding for non-string values.
                            x-kubernetes-preserve-unknown-fields: true
                        required:
                        - jsonPath
                        - operator
                        type: object
                      type: array
                    name:
                      description: Name identifies this rule for debugging and status
                        reporting.
                      minLength: 1
                      type: string
                    selector:
                      description: |-
                        Selector defines the ValuesSelector to inject when criteria match.
                        This selector is added to Addon.status.phaseValuesSelector.
                      properties:
                        matchLabels:
                          additionalProperties:
                            type: string
                          description: |-
                            MatchLabels selects AddonValue resources with matching labels.
                            All specified labels must match for selection.
                          type: object
                        name:
                          description: Name identifies this selector for debugging
                            and traceability.
                          type: string
                        priority:
                          default: 0
                          description: |-
                            Priority determines merge order. Lower values are applied first,
                            higher values override. Typical values: 0 (default), 50 (custom), 99 (immutable).
                          maximum: 100
                          minimum: 0
                          type: integer
                      required:
                      - matchLabels
                      - name
                      - priority
                      type: object
                  required:
                  - name
                  - selector
                  type: object
                minItems: 1
                type: array
            required:
            - rules
