                              apiVersion:
                                description: APIVersion of the resource (e.g., "addons.in-cloud.io/v1alpha1").
                                type: string
                              kind:
                                description: Kind of the resource (e.g., "Addon",
                                  "Secret").
                                type: string
                              labelSelector:
